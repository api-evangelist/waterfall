aid: waterfall
name: Waterfall
description: >-
  Waterfall is a sequential software development methodology where progress
  flows steadily downward through defined phases including requirements,
  system design, implementation, testing, deployment, and maintenance. It
  emphasizes thorough documentation, fixed-scope planning, and phase-gate
  reviews before proceeding to subsequent stages. Waterfall remains widely
  used in regulated industries, government contracting, and projects with
  well-understood, stable requirements.
